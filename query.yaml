version: 1
indices:
  index-published-products:
    target: s3://published-products-index.json
    include:
      - /products/**
    properties:
      sku:
        select: head > meta[name="sku"]
        value: attribute(el, "content")
      last-modified:
        select: none
        value: >-
          parseTimestamp(headers["last-modified"], "ddd, DD MMM YYYY hh:mm:ss GMT")
  index-published-categories:
    target: s3://published-categories-index.json
    include:
      - /categories/**
    exclude:
      - /categories/default
    properties:
      urlpath:
        select: head > meta[name="urlpath"]
        value: attribute(el, "content")
      last-modified:
        select: none
        value: >-
          parseTimestamp(headers["last-modified"], "ddd, DD MMM YYYY hh:mm:ss GMT")
